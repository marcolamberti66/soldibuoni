let PRICES_LAST_UPDATED = null;
let PRICES_SOURCE = "hardcoded";

async function loadDynamicPrices() {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 4000);
    const res = await fetch("/.netlify/functions/get-prices", { signal: controller.signal });
    clearTimeout(timeout);
    
    if (!res.ok) return false;
    const payload = await res.json();
    
    // Funzione di validazione rigorosa: accetta solo oggetti con un prezzo numerico valido
    const validateData = (arr) => Array.isArray(arr) ? arr.filter(p => typeof p.prezzo === 'number' && !isNaN(p.prezzo)) : [];

    const validEnergia = validateData(payload?.data?.energia);
    const validGas = validateData(payload?.data?.gas);
    const validInternet = validateData(payload?.data?.internet);

    // Sovrascrive solo se ci sono almeno 3 offerte valide e sicure
    if (validEnergia.length >= 3) { ENERGY_PROVIDERS = validEnergia; PRICES_SOURCE = "live"; }
    if (validGas.length >= 3) { GAS_PROVIDERS = validGas; PRICES_SOURCE = "live"; }
    if (validInternet.length >= 3) { INTERNET_PROVIDERS = validInternet; PRICES_SOURCE = "live"; }
    
    if (payload?.lastUpdated) { PRICES_LAST_UPDATED = new Date(payload.lastUpdated); }
    console.log("✅ Prezzi live caricati e validati:", PRICES_SOURCE);
    return true;
  } catch (err) {
    console.warn("⚠️ Prezzi dinamici non validi o irraggiungibili, uso fallback hardcoded");
    return false;
  }
}

function NewsletterForm() {
  const [email, setEmail] = useState("");
  const [status, setStatus] = useState("idle"); // idle, loading, success, error
  const submit = async () => {
    if (!email || !email.includes("@")) return;
    setStatus("loading");
    try {
      const res = await fetch("/api/brevo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "newsletter", email }),
      });
      if (res.ok) { setStatus("success"); }
      else { setStatus("error"); }
    } catch (e) { setStatus("error"); }
  };
  if (status === "success") {
    return (
      <div style={{ background: "#059669", borderRadius: 10, padding: "14px 24px", color: "#fff", fontSize: 14, fontWeight: 600 }}>
        ✅ Iscritto! Controlla la tua email per la conferma.
      </div>
    );
  }
  return (
    <div className="lead-form-inner" style={{ display: "flex", gap: 10 }}>
      <input type="email" placeholder="La tua email" value={email} onChange={e => setEmail(e.target.value)}
        onKeyDown={e => e.key === "Enter" && submit()}
        style={{ padding: "12px 16px", border: "1px solid #334155", borderRadius: 10, background: "#1e293b", color: "#fff", width: 240, outline: "none", fontSize: 14, fontFamily: "inherit" }} />
      <button onClick={submit} disabled={status === "loading"} style={{
        background: status === "loading" ? "#475569" : "linear-gradient(135deg, #059669, #10b981)", color: "#fff",
        border: "none", padding: "12px 22px", borderRadius: 10, fontWeight: 600,
        cursor: status === "loading" ? "wait" : "pointer", fontSize: 14, fontFamily: "inherit", whiteSpace: "nowrap",
      }}>{status === "loading" ? "Invio..." : status === "error" ? "Riprova" : "Attiva →"}</button>
    </div>
  );
}

function EnergiaComp({ color }) {
  const [consumo, setConsumo] = useState(2700);
  const [filtroTipo, setFiltroTipo] = useState("tutti");
  const [sort, setSort] = useState("costo");
  const sorted = useMemo(() => {
    let w = ENERGY_PROVIDERS.map(p => ({...p, costoAnnuo: (p.prezzo * consumo) + (p.fisso * 12)}));
    if (filtroTipo === "fisso") w = w.filter(p => p.tipo && p.tipo.toLowerCase().startsWith("fisso"));
    if (filtroTipo === "variabile") w = w.filter(p => p.tipo && p.tipo.toLowerCase().startsWith("variabil"));
    return sort === "costo" ? w.sort((a,b) => a.costoAnnuo - b.costoAnnuo) : w.sort((a,b) => a.prezzo - b.prezzo);
  }, [consumo, sort, filtroTipo]);
  return (
    <div>
      <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: 24, color: "#0f172a", marginBottom: 18 }}>Comparatore Tariffe Energia</h2>
      <div style={{ background: "#fff", borderRadius: 14, padding: 22, border: "1px solid #e2e8f0", marginBottom: 20 }}>
        <label style={{ fontSize: 14, fontWeight: 600, color: "#0f172a", display: "block", marginBottom: 8 }}>Consumo annuo: <span style={{ color: color }}>{consumo.toLocaleString()} kWh</span></label>
        <input type="range" min={1000} max={6000} step={100} value={consumo} onChange={e => setConsumo(+e.target.value)} style={{ width: "100%", accentColor: color }} />
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#94a3b8" }}><span>1.000</span><span>6.000 kWh</span></div>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
        {[["tutti","Tutte"],["fisso","Prezzo Fisso"],["variabile","Prezzo Variabile"]].map(([v,l]) => (
          <button key={v} onClick={() => setFiltroTipo(v)} style={{ padding: "8px 16px", borderRadius: 8, border: filtroTipo===v ? "none" : "1px solid #e2e8f0", fontSize: 13, fontWeight: 600, background: filtroTipo===v ? color : "#fff", color: filtroTipo===v ? "#fff" : "#64748b", cursor: "pointer", fontFamily: "inherit" }}>{l}</button>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {[["costo","Costo annuo"],["prezzo","Prezzo kWh"]].map(([v,l]) => (
          <button key={v} onClick={() => setSort(v)} style={{ padding: "6px 12px", borderRadius: 6, border: "none", fontSize: 12, fontWeight: 600, background: sort===v ? "#0f172a" : "#f1f5f9", color: sort===v ? "#fff" : "#94a3b8", cursor: "pointer", fontFamily: "inherit" }}>{l}</button>
        ))}
      </div>
      {sorted.length === 0 && <p style={{ textAlign: "center", color: "#94a3b8", padding: 40 }}>Nessuna offerta trovata per questo filtro.</p>}
      {sorted.map((p, i) => (
        <ProviderRow key={(p.name||"")+p.tipo+p.prezzo} p={p} i={i} color={color}>
          <div style={{ minWidth: 160 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span style={{ fontWeight: 700, color: "#0f172a", fontSize: 15 }}>{p.name}</span>
              {i === 0 && <Badge text="BEST" color={color} />}
              {p.verde && <span style={{ fontSize: 11, color: "#059669" }}>🌿 Green</span>}
            </div>
            <span style={{ fontSize: 12, color: "#94a3b8" }}>{p.tipo}{p.offerName ? " — " + p.offerName : (p.note ? " — " + p.note : "")}</span>
          </div>
          <div className="comparator-stats" style={{ display: "flex", gap: 20, alignItems: "center" }}>

function CalendarioAuto({ color }) {
  const [form, setForm] = useState({ targa: "", immatricolazione: "", ultimoTagliando: "", kmAttuali: "", ultimaRevisione: "", email: "", nome: "" });
  const [scadenze, setScadenze] = useState(null);
  const [apiStatus, setApiStatus] = useState("idle"); // idle, loading, success, error

  const calcola = async () => {
    // Validazione
    if (!form.email || !form.email.includes("@")) { alert("Inserisci un indirizzo email valido"); return; }
    if (!form.nome) { alert("Inserisci il tuo nome"); return; }
    if (!form.immatricolazione) { alert("Inserisci la data di immatricolazione"); return; }

    // Calcola scadenze
    const s = [];
    const now = new Date();
    const scadenzeDates = {};

    if (form.immatricolazione) {
      const imm = new Date(form.immatricolazione);
      let nb = new Date(now.getFullYear(), imm.getMonth(), 1);
      if (nb < now) nb.setFullYear(nb.getFullYear() + 1);
      s.push({ tipo: "Bollo Auto", data: nb, icon: "💳", desc: "Pagamento annuale tassa di possesso" });
      scadenzeDates.bollo = nb.toISOString().split("T")[0];

      let revDate;
      const ur = form.ultimaRevisione ? new Date(form.ultimaRevisione) : null;
      if (ur) { revDate = new Date(ur); revDate.setFullYear(revDate.getFullYear() + 2); }
      else { revDate = new Date(imm); revDate.setFullYear(revDate.getFullYear() + 4); }
      if (revDate < now) revDate.setFullYear(revDate.getFullYear() + 2);
      s.push({ tipo: "Revisione", data: revDate, icon: "🔍", desc: "Controllo obbligatorio sicurezza e emissioni" });
      scadenzeDates.revisione = revDate.toISOString().split("T")[0];
    }
    if (form.ultimoTagliando) {
      const ut = new Date(form.ultimoTagliando); ut.setFullYear(ut.getFullYear() + 1);
      if (ut < now) ut.setFullYear(now.getFullYear() + 1);
      s.push({ tipo: "Tagliando", data: ut, icon: "🔧", desc: "Manutenzione programmata (ogni 15.000 km o 12 mesi)" });
      scadenzeDates.tagliando = ut.toISOString().split("T")[0];
    }
    let gi = new Date(now.getFullYear(), 10, 15); if (gi < now) gi.setFullYear(gi.getFullYear() + 1);
    s.push({ tipo: "Cambio gomme invernali", data: gi, icon: "🛞", desc: "Obbligo pneumatici invernali o catene (15 nov - 15 apr)" });
    scadenzeDates.gommeInvernali = gi.toISOString().split("T")[0];

    let ge = new Date(now.getFullYear(), 3, 15); if (ge < now) ge.setFullYear(ge.getFullYear() + 1);
    s.push({ tipo: "Cambio gomme estive", data: ge, icon: "☀️", desc: "Fine obbligo pneumatici invernali" });
    scadenzeDates.gommeEstive = ge.toISOString().split("T")[0];

    s.sort((a,b) => a.data - b.data);
    setScadenze(s);

    // Invia a Brevo
    setApiStatus("loading");
    try {
      const res = await fetch("/api/brevo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "car_reminder",
          email: form.email,
          nome: form.nome,
          targa: form.targa,
          scadenze: scadenzeDates,
        }),
      });
      if (res.ok) { setApiStatus("success"); }
      else { setApiStatus("error"); }
    } catch (e) { setApiStatus("error"); }
  };

  const is_ = { padding: "11px 14px", border: "1px solid #e2e8f0", borderRadius: 10, fontSize: 14, fontFamily: "inherit", outline: "none", width: "100%", background: "#f8fafc" };
  return (
    <div>
      <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: 24, color: "#0f172a", marginBottom: 6 }}>Calendario Manutenzione Auto</h2>
      <p style={{ color: "#64748b", fontSize: 14, marginBottom: 20, lineHeight: 1.6 }}>Inserisci i dati del veicolo e ricevi promemoria via email una settimana prima di ogni scadenza.</p>
      <div style={{ background: "#fff", borderRadius: 14, padding: 24, border: "1px solid #e2e8f0", marginBottom: 20 }}>
        <div className="calendar-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <div><label style={{ fontSize: 12, fontWeight: 600, color: "#475569", display: "block", marginBottom: 3 }}>Nome *</label><input style={is_} placeholder="Mario Rossi" value={form.nome} onChange={e => setForm(p => ({...p, nome: e.target.value}))} /></div>
          <div><label style={{ fontSize: 12, fontWeight: 600, color: "#475569", display: "block", marginBottom: 3 }}>Email *</label><input type="email" style={is_} placeholder="mario@email.it" value={form.email} onChange={e => setForm(p => ({...p, email: e.target.value}))} /></div>
          <div><label style={{ fontSize: 12, fontWeight: 600, color: "#475569", display: "block", marginBottom: 3 }}>Targa</label><input style={is_} placeholder="AB123CD" value={form.targa} onChange={e => setForm(p => ({...p, targa: e.target.value.toUpperCase()}))} /></div>
          <div><label style={{ fontSize: 12, fontWeight: 600, color: "#475569", display: "block", marginBottom: 3 }}>Data immatricolazione *</label><input type="date" style={is_} value={form.immatricolazione} onChange={e => setForm(p => ({...p, immatricolazione: e.target.value}))} /></div>
          <div><label style={{ fontSize: 12, fontWeight: 600, color: "#475569", display: "block", marginBottom: 3 }}>Ultimo tagliando</label><input type="date" style={is_} value={form.ultimoTagliando} onChange={e => setForm(p => ({...p, ultimoTagliando: e.target.value}))} /></div>
          <div><label style={{ fontSize: 12, fontWeight: 600, color: "#475569", display: "block", marginBottom: 3 }}>Ultima revisione</label><input type="date" style={is_} value={form.ultimaRevisione} onChange={e => setForm(p => ({...p, ultimaRevisione: e.target.value}))} /></div>
          <div><label style={{ fontSize: 12, fontWeight: 600, color: "#475569", display: "block", marginBottom: 3 }}>Km attuali</label><input type="number" style={is_} placeholder="85000" value={form.kmAttuali} onChange={e => setForm(p => ({...p, kmAttuali: e.target.value}))} /></div>
        </div>
        <button onClick={calcola} disabled={apiStatus === "loading"} style={{
          background: apiStatus === "loading" ? "#94a3b8" : "linear-gradient(135deg, " + color + ", " + color + "cc)",
          color: "#fff", border: "none", padding: "13px 28px", borderRadius: 10, fontWeight: 700, fontSize: 15,
          cursor: apiStatus === "loading" ? "wait" : "pointer", fontFamily: "inherit", marginTop: 18, width: "100%"
        }}>{apiStatus === "loading" ? "Invio in corso..." : "Calcola Scadenze & Attiva Promemoria"}</button>
      </div>
      {scadenze && (
        <div style={{ animation: "fadeIn 0.5s ease-out" }}>
          <h3 style={{ fontFamily: "'Playfair Display',serif", fontSize: 20, color: "#0f172a", marginBottom: 14 }}>Le tue prossime scadenze</h3>
          {scadenze.map((s, i) => {
            const days = Math.ceil((s.data - new Date()) / 86400000);
            const urgent = days < 30;
            return (
              <div key={i} style={{ background: "#fff", borderRadius: 12, padding: "16px 20px", marginBottom: 8, border: "1px solid " + (urgent ? "#fecaca" : "#e2e8f0"), borderLeft: "4px solid " + (urgent ? "#dc2626" : color), display: "flex", alignItems: "center", gap: 14, animation: "slideUp 0.3s ease-out " + (i*0.08) + "s both" }}>
                <span style={{ fontSize: 26 }}>{s.icon}</span>
                <div style={{ flex: 1 }}>
                  <h4 style={{ color: "#0f172a", fontSize: 14, fontWeight: 700, marginBottom: 1 }}>{s.tipo}</h4>
                  <p style={{ color: "#64748b", fontSize: 12 }}>{s.desc}</p>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: urgent ? "#dc2626" : "#0f172a" }}>{s.data.toLocaleDateString("it-IT", { day: "numeric", month: "long", year: "numeric" })}</div>
                  <div style={{ fontSize: 12, color: urgent ? "#dc2626" : "#64748b" }}>{days > 0 ? "tra " + days + " giorni" : "SCADUTA"}</div>
                </div>
              </div>
            );
          })}
          {apiStatus === "success" && (
            <div style={{ background: "#f0fdf4", borderRadius: 12, padding: 18, marginTop: 14, border: "1px solid #bbf7d0" }}>
              <p style={{ color: "#166534", fontSize: 14 }}>✅ <strong>Promemoria attivati!</strong> Abbiamo inviato un'email di conferma con il riepilogo a <strong>{form.email}</strong>. Riceverai un promemoria una settimana prima di ogni scadenza.</p>
            </div>
          )}
          {apiStatus === "error" && (
            <div style={{ background: "#fef2f2", borderRadius: 12, padding: 18, marginTop: 14, border: "1px solid #fecaca" }}>
              <p style={{ color: "#991b1b", fontSize: 14 }}>⚠️ Le scadenze sono state calcolate correttamente, ma si è verificato un errore nell'attivazione dei promemoria email. Riprova più tardi o contattaci.</p>
            </div>
          )}
          {apiStatus === "loading" && (
            <div style={{ background: "#f0f9ff", borderRadius: 12, padding: 18, marginTop: 14, border: "1px solid #bae6fd" }}>
              <p style={{ color: "#0c4a6e", fontSize: 14 }}>⏳ Attivazione promemoria in corso...</p>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

  const [visible, setVisible] = useState(true);

  const handle = (type) => {
    localStorage.setItem("sb_cookie_consent", type);
    setVisible(false);
    onAccept(type);
  };
  return (
    <div style={{
      position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 9999,
      background: "#0f172a", color: "#e2e8f0", padding: "16px 24px",

      display: "flex", flexWrap: "wrap", alignItems: "center", gap: 12,
      justifyContent: "space-between", animation: "slideUp 0.4s ease-out",
    }}>
      <div style={{ flex: 1, minWidth: 260, fontSize: 13, lineHeight: 1.6 }}>
        🍪 <strong>Questo sito usa cookie tecnici</strong> necessari al funzionamento e, con il tuo consenso, cookie analitici per migliorare l'esperienza.
        Raccogliamo la tua email solo se la fornisci volontariamente (newsletter o promemoria auto).
        Leggi la nostra{" "}
        <span onClick={() => { localStorage.setItem("sb_cookie_consent", "accepted"); setVisible(false); onAccept("accepted"); window.dispatchEvent(new CustomEvent("navigate", { detail: "privacy" })); }}
          style={{ color: "#34d399", cursor: "pointer", textDecoration: "underline" }}>
          Privacy Policy
        </span>.
      </div>
      <div style={{ display: "flex", gap: 10, flexShrink: 0 }}>
        <button onClick={() => handle("necessary")} style={{
          background: "transparent", color: "#94a3b8", border: "1px solid #475569",
          padding: "8px 16px", borderRadius: 8, cursor: "pointer", fontSize: 13,
          fontFamily: "inherit", fontWeight: 500,
        }}>Solo necessari</button>
        <button onClick={() => handle("accepted")} style={{
          background: "linear-gradient(135deg, #059669, #10b981)", color: "#fff", border: "none",
          padding: "8px 20px", borderRadius: 8, cursor: "pointer", fontSize: 13,
          fontFamily: "inherit", fontWeight: 600,
        }}>Accetta tutti</button>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState("home");
  const [cookieConsent, setCookieConsent] = useState(() => localStorage.getItem("sb_cookie_consent"));

  const navigate = useCallback((p) => {
    setPage(p);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, []);

  useEffect(() => {
    const handler = (e) => navigate(e.detail);
    window.addEventListener("navigate", handler);
    return () => window.removeEventListener("navigate", handler);
  }, [navigate]);

  let content;
  if (page === "home") content = <Home onNavigate={navigate} />;
  else if (page === "privacy") content = <PrivacyPolicyPage onNavigate={navigate} />;
  else if (page.startsWith("cat_")) content = <CategoryPage catId={page} onNavigate={navigate} />;
  else if (page.startsWith("topic_")) content = <TopicPage topicId={page.replace("topic_", "")} onNavigate={navigate} />;

  return (
    <div style={{ minHeight: "100vh", background: "#f8fafc" }}>
      <Navbar onNavigate={navigate} currentPage={page} />
      {content}
      <footer style={{ background: "#0f172a", color: "#64748b", padding: "36px 20px", textAlign: "center", fontSize: 13 }}>
        <span style={{ fontFamily: "'Playfair Display',serif", color: "#fff", fontWeight: 700, fontSize: 18 }}>Soldi Buoni</span>
        <p style={{ marginTop: 6 }}>Comparatori imparziali e guide operative per le tue finanze personali.</p>
        <p style={{ marginTop: 8 }}>
          <span onClick={() => navigate("privacy")} style={{ color: "#94a3b8", cursor: "pointer", textDecoration: "underline", fontSize: 12 }}>Privacy Policy</span>
          <span style={{ margin: "0 8px", color: "#475569" }}>·</span>
          <span style={{ fontSize: 12 }}>© 2026 Soldi Buoni — I dati sono indicativi e non costituiscono consulenza finanziaria.</span>
        </p>
      </footer>
      {!cookieConsent && <CookieBanner onAccept={setCookieConsent} />}
    </div>
  );
}

loadDynamicPrices().finally(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
});
